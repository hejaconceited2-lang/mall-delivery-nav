<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>华林国际C馆 · 配送导航</title>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --surface2: #f8f9fb;
  --text: #1a1d23;
  --text2: #5f6570;
  --text3: #949aa5;
  --border: #e5e8ed;
  --accent: #2563eb;
  --accent2: #1d4ed8;
  --accent-light: #eff4ff;
  --red: #dc2626;
  --red-light: #fef2f2;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --green: #059669;
  --green-light: #ecfdf5;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.08);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; min-height:100vh; }

/* ── Header ── */
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; height:56px; }
.header-brand { display:flex; align-items:center; gap:10px; }
.header-logo { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px; font-weight:700; }
.header-title { font-size:16px; font-weight:600; color:var(--text); }
.header-sub { font-size:11px; color:var(--text3); }

/* ── Tab Bar ── */
.tab-bar { background:var(--surface); border-bottom:1px solid var(--border); display:flex; padding:0 20px; gap:0; position:sticky; top:56px; z-index:99; }
.tab-bar button { flex:0 0 auto; padding:14px 24px; border:none; background:none; font-size:14px; font-weight:500; color:var(--text2); cursor:pointer; position:relative; transition:color .2s; font-family:var(--font); }
.tab-bar button:hover { color:var(--text); }
.tab-bar button.active { color:var(--accent); font-weight:600; }
.tab-bar button.active::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:24px; height:3px; background:var(--accent); border-radius:3px 3px 0 0; }

/* ── Main Content ── */
.main { max-width:960px; margin:0 auto; padding:20px; }
.panel { display:none; animation:fadeIn .25s ease; }
.panel.active { display:block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* ── Stats Dashboard ── */
.stats-row { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.stat-card { background:var(--surface); border-radius:var(--radius); padding:16px 20px; flex:1; min-width:100px; box-shadow:var(--shadow); text-align:center; cursor:default; transition:box-shadow .2s; }
.stat-card:hover { box-shadow:var(--shadow-lg); }
.stat-card.clickable { cursor:pointer; }
.stat-card .stat-num { font-size:26px; font-weight:700; color:var(--text); line-height:1.2; }
.stat-card .stat-label { font-size:11px; color:var(--text3); margin-top:2px; text-transform:uppercase; letter-spacing:.5px; }
.stat-card.accent { background:var(--accent-light); }
.stat-card.accent .stat-num { color:var(--accent); }

/* ── Search ── */
.search-wrapper { margin-bottom:20px; }
.search-box { position:relative; background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); display:flex; align-items:center; padding:4px; }
.search-icon { flex:0 0 44px; height:44px; display:flex; align-items:center; justify-content:center; color:var(--text3); }
.search-box input { flex:1; height:44px; border:none; font-size:15px; outline:none; background:transparent; color:var(--text); font-family:var(--font); }
.search-box input::placeholder { color:var(--text3); }
.search-clear { flex:0 0 36px; height:36px; border-radius:50%; border:none; background:var(--border); color:var(--text2); cursor:pointer; display:none; align-items:center; justify-content:center; margin-right:4px; font-size:16px; transition:background .2s; }
.search-clear.show { display:flex; }
.search-clear:hover { background:#d1d5db; }

/* ── Result List ── */
.result-list { display:flex; flex-direction:column; gap:8px; }
.result-card { background:var(--surface); border-radius:var(--radius); padding:16px 20px; box-shadow:var(--shadow); display:flex; align-items:flex-start; gap:14px; transition:box-shadow .2s; cursor:default; }
.result-card:hover { box-shadow:var(--shadow-lg); }
.result-badge { flex:0 0 auto; min-width:44px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; }
.badge-floor { background:var(--accent-light); color:var(--accent); }
.result-body { flex:1; min-width:0; }
.result-num { font-size:17px; font-weight:600; color:var(--text); }
.result-meta { display:flex; gap:12px; margin-top:4px; flex-wrap:wrap; }
.result-meta span { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:4px; }
.result-meta .meta-icon { font-size:14px; }
.result-direction { margin-top:8px; padding:10px 14px; background:var(--amber-light); border-radius:var(--radius-sm); font-size:13px; color:var(--amber); line-height:1.5; border-left:3px solid var(--amber); }
.result-action { flex:0 0 auto; }
.btn-locate { padding:8px 16px; background:var(--accent); color:#fff; border:none; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; transition:background .2s; font-family:var(--font); }
.btn-locate:hover { background:var(--accent2); }

/* ── Empty State ── */
.empty-state { text-align:center; padding:48px 20px; color:var(--text3); }
.empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* ── Guide (empty state) ── */
.guide { text-align:center; padding:36px 20px 20px; color:var(--text2); }
.guide-title { font-size:18px; font-weight:700; color:var(--text); margin-bottom:6px; }
.guide-sub { font-size:13px; color:var(--text3); margin-bottom:24px; }
.guide-steps { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-bottom:24px; }
.guide-step { background:var(--surface); border-radius:var(--radius); padding:20px 16px; width:150px; box-shadow:var(--shadow); text-align:center; position:relative; }
.guide-step-num { position:absolute; top:-10px; left:50%; transform:translateX(-50%); width:22px; height:22px; border-radius:50%; background:var(--accent); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; }
.guide-step-icon { font-size:28px; margin-bottom:8px; margin-top:4px; }
.guide-step-title { font-size:14px; font-weight:600; color:var(--text); margin-bottom:4px; }
.guide-step-desc { font-size:12px; color:var(--text3); line-height:1.5; }
.guide-foot { font-size:11px; color:var(--text3); padding:12px 16px; background:var(--surface2); border-radius:var(--radius-sm); display:inline-block; }
@media (max-width:600px) {
  .guide { padding:24px 12px 12px; }
  .guide-steps { gap:8px; }
  .guide-step { width:130px; padding:14px 10px; }
}

/* ── Map Panel ── */
.floor-pills { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.floor-pill { padding:8px 20px; border:1.5px solid var(--border); border-radius:24px; background:var(--surface); font-size:13px; font-weight:500; cursor:pointer; color:var(--text2); transition:all .2s; font-family:var(--font); }
.floor-pill:hover { border-color:var(--accent); color:var(--accent); }
.floor-pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.map-toolbar { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.mode-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; }
.mode-badge.browse { background:var(--green-light); color:var(--green); }
.mode-badge.mark { background:var(--amber-light); color:var(--amber); animation:pulse-badge 1s infinite; }
@keyframes pulse-badge { 0%,100% { opacity:1; } 50% { opacity:.6; } }
.map-hint { font-size:12px; color:var(--text3); }
.map-frame { background:var(--surface); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); position:relative; }
.map-wrapper { position:relative; cursor:crosshair; display:inline-block; width:100%; }
.map-wrapper img { width:100%; display:block; }
.map-crosshair { position:absolute; width:32px; height:32px; border:2px dashed var(--red); border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; display:none; z-index:20; }
.map-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.map-marker { position:absolute; border:2px dashed rgba(220,38,38,.7); border-radius:50%; background:transparent; transform:translate(-50%,-50%); animation:pulse-ring 1.5s ease-in-out infinite; pointer-events:none; }
@keyframes pulse-ring { 0%,100% { border-color:rgba(220,38,38,.5); box-shadow:0 0 0 0 rgba(220,38,38,.12); } 50% { border-color:rgba(220,38,38,.9); box-shadow:0 0 0 10px rgba(220,38,38,0); } }
.map-marker-old { position:absolute; border:2.5px dashed rgba(217,119,6,.75); border-radius:50%; background:rgba(251,191,36,.12); transform:translate(-50%,-50%); pointer-events:none; }
.map-label-old { position:absolute; background:rgba(217,119,6,.88); color:#fff; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:600; white-space:nowrap; pointer-events:none; z-index:5; }
.map-label { position:absolute; background:rgba(220,38,38,.88); color:#fff; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:600; white-space:nowrap; pointer-events:none; z-index:10; }
.map-info { text-align:center; font-size:12px; color:var(--text3); margin-top:10px; }
.map-coord { text-align:center; font-size:12px; color:var(--red); margin-top:2px; }

/* ── Form ── */
.section-title { font-size:15px; font-weight:600; color:var(--text); margin:24px 0 12px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-grid .full { grid-column:1/-1; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group label { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.3px; }
.form-group input, .form-group textarea, .form-group select { padding:10px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14px; outline:none; background:var(--surface); color:var(--text); font-family:var(--font); transition:border .2s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.form-group textarea { height:60px; resize:vertical; }
.coord-hint { font-size:11px; color:var(--text3); font-weight:400; text-transform:none; letter-spacing:0; }

/* ── Buttons ── */
.btn-group { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }
.btn { padding:10px 22px; border:none; border-radius:var(--radius-sm); font-size:14px; font-weight:600; cursor:pointer; font-family:var(--font); transition:all .2s; display:inline-flex; align-items:center; gap:6px; }
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-outline { background:var(--surface); color:var(--text2); border:1.5px solid var(--border); }
.btn-outline:hover { border-color:var(--accent); color:var(--accent); }
.btn-danger { background:var(--surface); color:var(--red); border:1.5px solid var(--red); }
.btn-danger:hover { background:var(--red-light); }
.btn-ghost { background:transparent; color:var(--accent); padding:8px 16px; }
.btn-ghost:hover { background:var(--accent-light); }

/* ── Table ── */
.data-table { width:100%; border-collapse:collapse; font-size:13px; background:var(--surface); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
.data-table th { background:var(--surface2); color:var(--text2); font-weight:600; padding:10px 14px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.3px; border-bottom:1px solid var(--border); }
.data-table td { padding:10px 14px; border-bottom:1px solid var(--border); color:var(--text); }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:var(--accent-light); }
.data-table .cell-coord { font-family:monospace; font-size:11px; color:var(--text3); }
.data-table .cell-coord.missing { color:#d1d5db; }
.row-actions { display:flex; gap:4px; }
.btn-sm { padding:4px 10px; border:none; border-radius:5px; font-size:11px; font-weight:600; cursor:pointer; font-family:var(--font); transition:all .15s; }
.btn-sm-locate { background:var(--green-light); color:var(--green); }
.btn-sm-locate:hover { background:#d1fae5; }
.btn-sm-edit { background:var(--accent-light); color:var(--accent); }
.btn-sm-edit:hover { background:#dbeafe; }
.btn-sm-mark { background:var(--amber-light); color:var(--amber); }
.btn-sm-mark:hover { background:#fef3c7; }
.btn-sm-del { background:var(--red-light); color:var(--red); }
.btn-sm-del:hover { background:#fee2e2; }

/* ── Import Area ── */
.import-box { background:var(--surface); border:2px dashed var(--border); border-radius:var(--radius); padding:20px; margin-top:16px; }
.import-box textarea { width:100%; height:100px; border:1.5px solid var(--border); border-radius:var(--radius-sm); padding:12px; font-size:13px; font-family:monospace; resize:vertical; }
.import-box .hint { font-size:11px; color:var(--text3); margin:8px 0; }

/* ── Lightbox ── */
.lightbox { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.92); z-index:9999; display:none; align-items:center; justify-content:center; }
.lightbox.show { display:flex; }
.lightbox img { max-width:95vw; max-height:95vh; object-fit:contain; border-radius:4px; }
.lightbox-close { position:absolute; top:12px; right:16px; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.15); color:#fff; border:none; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; }
.lightbox-hint { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.5); font-size:11px; pointer-events:none; }
	.lightbox-spinner { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:40px; height:40px; border:3px solid rgba(255,255,255,.15); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; z-index:5; }
	@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

/* ── Responsive ── */
@media (max-width:640px) {
  .main { padding:12px; }
  .header { padding:0 14px; height:50px; }
  .header-title { font-size:14px; }
  .tab-bar { padding:0 8px; overflow-x:auto; }
  .tab-bar button { padding:12px 14px; font-size:13px; white-space:nowrap; }
  .stats-row { gap:8px; }
  .stat-card { padding:12px 14px; }
  .stat-card .stat-num { font-size:22px; }
  .form-grid { grid-template-columns:1fr; }
  .result-card { flex-wrap:wrap; }
  .result-action { flex:1 0 100%; margin-top:8px; }
  .btn-locate { width:100%; text-align:center; }
  .floor-pills { gap:6px; }
  .floor-pill { padding:6px 14px; font-size:12px; }
}
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">M</div>
    <div>
      <div class="header-title">华林国际C馆</div>
      <div class="header-sub" id="mallName">配送导航</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--text3);" id="mallTag"></div>
</header>

<!-- ── Tab Bar ── -->
<nav class="tab-bar">
  <button class="active" onclick="switchTab('search')">搜索</button>
  <button onclick="switchTab('map')">楼层图</button>
  <button onclick="switchTab('data')">数据</button>
</nav>

<!-- ── Main Content ── -->
<main class="main">

  <!-- ====== SEARCH ====== -->
  <section id="panel-search" class="panel active">
    <div class="stats-row" id="statsBar"></div>
    <div class="search-wrapper">
      <div class="search-box">
        <div class="search-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <input type="text" id="searchInput" placeholder="输入店铺编号搜索…" oninput="doSearch()" autocomplete="off">
        <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="result-list" id="searchResults">
      <div class="guide" id="searchGuide">
        <div class="guide-title">🏬 华林国际C馆</div>
        <div class="guide-sub">外卖单上的店铺编号，输入就能找到</div>
        <div class="guide-steps">
          <div class="guide-step">
            <div class="guide-step-num">①</div>
            <div class="guide-step-icon">🔍</div>
            <div class="guide-step-title">输入编号</div>
            <div class="guide-step-desc">在搜索框输入外卖单<br>上的店铺号，如 4058</div>
          </div>
          <div class="guide-step">
            <div class="guide-step-num">②</div>
            <div class="guide-step-icon">📋</div>
            <div class="guide-step-title">查看结果</div>
            <div class="guide-step-desc">看到楼层、电梯口<br>和行走路线指引</div>
          </div>
          <div class="guide-step">
            <div class="guide-step-num">③</div>
            <div class="guide-step-icon">🗺️</div>
            <div class="guide-step-title">地图定位</div>
            <div class="guide-step-desc">点「查看位置」切到<br>楼层图，红点就是店铺</div>
          </div>
        </div>
        <div class="guide-foot">💡 在「楼层图」Tab 可切换楼层，提前看各层布局 · 找不到的店铺可对照疏散图确认</div>
      </div>
    </div>
  </section>

  <!-- ====== MAP ====== -->
  <section id="panel-map" class="panel">
    <div class="floor-pills" id="floorBtns"></div>
    <div class="map-toolbar">
      <span class="mode-badge browse" id="modeIndicator">浏览</span>
      <span class="map-hint" id="clickHint">点击楼层图查看高清大图</span>
    </div>
    <div class="map-frame">
      <div class="map-wrapper" id="mapWrapper" onclick="onMapClick(event)">
        <img id="floorImg" src="" alt="楼层疏散图" style="display:none;" draggable="false">
        <div class="map-crosshair" id="crosshair"></div>
        <div class="map-overlay" id="mapOverlay"></div>
      </div>
    </div>
    <div class="map-info" id="mapInfo">选择楼层查看</div>
    <div class="map-coord" id="coordDisplay"></div>
  </section>

  <!-- ====== DATA ====== -->
  <section id="panel-data" class="panel">
    <div class="form-group">
      <label>商城名称</label>
      <input type="text" id="mallNameInput" placeholder="例：万达广场 · 五角场" onchange="saveMallName()">
    </div>

    <div class="section-title">店铺信息</div>
    <div class="form-grid">
      <div class="form-group"><label>楼层</label><select id="editFloor"></select></div>
      <div class="form-group"><label>店铺编号</label><input type="text" id="editNum" placeholder="例：4058, 5A19"></div>
      <div class="form-group full"><label>最近电梯 / 出入口</label><input type="text" id="editElevator" placeholder="例：6号客梯"></div>
      <div class="form-group full"><label>行走路线</label><textarea id="editDirection" placeholder="例：出电梯左转，直行20米，第一个路口右转，右手边第3家"></textarea></div>
      <div class="form-group"><label>X坐标 (%) <span class="coord-hint">在楼层图上点击获取</span></label><input type="text" id="editCoordX" placeholder="—"></div>
      <div class="form-group"><label>Y坐标 (%) <span class="coord-hint">在楼层图上点击获取</span></label><input type="text" id="editCoordY" placeholder="—"></div>
    </div>
    <input type="hidden" id="editId">

    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveShop()">保存</button>
      <button class="btn btn-outline" onclick="clearForm()">清空</button>
      <button class="btn btn-outline" onclick="switchTab('map'); markMode(document.getElementById('editId').value)" id="pickCoordBtn">在地图上取坐标</button>
    </div>

    <div class="section-title">已录入</div>
    <table class="data-table" id="shopTable">
      <thead><tr><th>楼层</th><th>编号</th><th>坐标</th><th style="width:120px;">操作</th></tr></thead>
      <tbody id="shopTableBody"></tbody>
    </table>
    <div class="empty-state" id="tableEmpty" style="padding:32px;"><p>暂无数据</p></div>

    <div class="btn-group">
      <button class="btn btn-outline" onclick="migrateOldData()">迁移旧数据</button>
      <button class="btn btn-outline" onclick="loadDefaults()">加载预提取编号</button>
      <button class="btn btn-outline" onclick="exportData()">导出备份</button>
      <button class="btn btn-outline" onclick="document.getElementById('importArea').style.display='block'">批量导入</button>
      <button class="btn btn-outline" onclick="downloadCSV()">导出 CSV</button>
      <button class="btn btn-danger" onclick="clearAllData()">清空数据</button>
    </div>

function getShops() {
  try {
    let shops = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!shops || shops.length === 0) {
      const old = JSON.parse(localStorage.getItem(OLD_KEY));
      if (old && old.length > 0) {
        shops = old.map(s => ({...s, _id: s._id||('m'+Date.now().toString(36)+Math.random().toString(36).substr(2,6))}));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(shops));
      }
    }
    if (!shops || shops.length === 0) {
      shops = DEFAULT_SHOPS.map(s => ({...s, _id: 'd'+Math.random().toString(36).substr(2,8)}));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(shops));
    }
    return shops;
  } catch(e) { return []; }
}
function saveShops(shops) { localStorage.setItem(STORAGE_KEY, JSON.stringify(shops)); }
function getMallName() { return localStorage.getItem(MALL_KEY) || ''; }

/* ====== INIT ====== */
function init() {
  const mn = getMallName();
  document.getElementById('mallName').textContent = mn || '华林国际C馆';
  document.getElementById('mallNameInput').value = mn;
  document.getElementById('mallTag').textContent = mn ? '已配置' : '';
  buildFloorSelects();
  buildFloorBtns();
  renderShopTable();
  updateStats();
  if (floorConfig.length > 0) showFloorMap(0);
}

function buildFloorSelects() {
  const sel = document.getElementById('editFloor');
  sel.innerHTML = '<option value="">选择楼层</option>';
  floorConfig.forEach(f => sel.innerHTML += `<option value="${f.id}">${f.label}</option>`);
}

function buildFloorBtns() {
  document.getElementById('floorBtns').innerHTML = floorConfig.map((f,i) =>
    `<button class="floor-pill${i===currentFloorIdx?' active':''}" onclick="showFloorMap(${i})">${f.label}</button>`
  ).join('');
}

function showFloorMap(idx) {
  currentFloorIdx = idx;
  document.querySelectorAll('.floor-pill').forEach((b,i) => b.classList.toggle('active', i===idx));
  const img = document.getElementById('floorImg');
  const f = floorConfig[idx];
  if (f && f.imgFile) {
    // Load thumbnail for fast display; full image only on lightbox click
    img.src = f.thumbFile || f.imgFile;
    img.style.display = 'block';
    img.onclick = function() { if (!isMarkMode) openLightbox(f.imgFile); };
  }
  document.getElementById('mapInfo').textContent = `${f.label} · 浏览模式`;
  document.getElementById('mapOverlay').innerHTML = '';
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('coordDisplay').textContent = '';
}

/* ====== TAB SWITCH ====== */
function switchTab(tab) {
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (tab === 'search') {
    document.querySelector('.tab-bar button:nth-child(1)').classList.add('active');
    document.getElementById('panel-search').classList.add('active');
    updateStats();
  } else if (tab === 'map') {
    document.querySelector('.tab-bar button:nth-child(2)').classList.add('active');
    document.getElementById('panel-map').classList.add('active');
  } else if (tab === 'data') {
    document.querySelector('.tab-bar button:nth-child(3)').classList.add('active');
    document.getElementById('panel-data').classList.add('active');
    renderShopTable();
  }
}

/* ====== SEARCH ====== */
function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  const clearBtn = document.getElementById('clearBtn');
  const resultsDiv = document.getElementById('searchResults');
  if (q) { clearBtn.classList.add('show'); }
  else {
    clearBtn.classList.remove('show');
    resultsDiv.innerHTML = renderGuideHTML();
    updateStats(); return;
  }
  const shops = getShops();
  const qLower = q.toLowerCase();
  const matched = shops.filter(s => s.num.toLowerCase().includes(qLower) || (s.floor||'').toLowerCase().includes(qLower));
  if (matched.length === 0) {
    resultsDiv.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>未找到「${q}」</p></div>`;
  } else {
    resultsDiv.innerHTML = matched.map(s => `
      <div class="result-card">
        <div class="result-badge badge-floor">${s.floor}</div>
        <div class="result-body">
          <div class="result-num">${s.num}</div>
          <div class="result-meta">
            ${s.elevator ? `<span><span class="meta-icon">🛗</span>${s.elevator}</span>` : ''}
          </div>
          ${s.direction ? `<div class="result-direction">${s.direction}</div>` : ''}
        </div>
        <div class="result-action">
          <button class="btn-locate" onclick="locateShop('${s._id}')">查看位置</button>
        </div>
      </div>
    `).join('');
  }
  updateStats(matched.length);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('show');
  document.getElementById('searchResults').innerHTML = renderGuideHTML();
  updateStats();
}

function renderGuideHTML() {
  const counts = {};
  getShops().forEach(s => { counts[s.floor] = (counts[s.floor]||0)+1; });
  const total = getShops().length;
  const floorSummary = ['1F','2F','3F','4F','5F','6F'].map(f => counts[f]||0).join('/');
  return `<div class="guide" id="searchGuide">
    <div class="guide-title">🏬 华林国际C馆</div>
    <div class="guide-sub">外卖单上的店铺编号，输入就能找到</div>
    <div class="guide-steps">
      <div class="guide-step">
        <div class="guide-step-num">①</div>
        <div class="guide-step-icon">🔍</div>

        <div class="guide-step-desc">在搜索框输入外卖单<br>上的店铺号，如 4058</div>
      </div>
      <div class="guide-step">

        <div class="guide-step-icon">📋</div>
        <div class="guide-step-title">查看结果</div>
        <div class="guide-step-desc">看到楼层、电梯口<br>和行走路线指引</div>
      </div>
      <div class="guide-step">
        <div class="guide-step-num">③</div>
        <div class="guide-step-icon">🗺️</div>
        <div class="guide-step-title">地图定位</div>
        <div class="guide-step-desc">点「查看位置」切到<br>楼层图，红点就是店铺</div>
      </div>
    </div>
    <div class="guide-foot">💡 在「楼层图」Tab 可切换楼层提前看布局 · 各楼层 ${floorSummary} · ${total} 家</div>
  </div>`;
}

function locateShop(shopId) {
  const shops = getShops();
  const s = shops.find(s => s._id === shopId);
  if (!s) return;
  if (s.coordX == null || s.coordY == null) {
    alert(`「${s.num}」尚未标注坐标。请在「数据」中找到该编号，点击「在地图上取坐标」，然后在地图上点击该编号所在位置。`);
    return;
  }
  const fi = floorConfig.findIndex(f => f.id === s.floor);
  if (fi < 0) { alert('楼层配置异常'); return; }
  showFloorMap(fi);
  switchTab('map');
  const overlay = document.getElementById('mapOverlay');
  overlay.innerHTML = `
    <div class="map-marker" style="left:${s.coordX}%;top:${s.coordY}%;width:38px;height:38px;"></div>
    <div class="map-label" style="left:${s.coordX}%;top:${s.coordY}%;transform:translate(22px,-22px);">${s.num}</div>
  `;
  document.getElementById('mapInfo').textContent = `${s.floor} · ${s.num}`;
  document.getElementById('coordDisplay').textContent = `坐标 ${s.coordX}%, ${s.coordY}%`;
}

function updateStats(filteredCount) {
  const shops = getShops();
  const byFloor = {};
  shops.forEach(s => { byFloor[s.floor] = (byFloor[s.floor]||0)+1; });
  const withCoords = shops.filter(s => s.coordX != null).length;
  let html = `<div class="stat-card"><div class="stat-num">${shops.length}</div><div class="stat-label">总编号</div></div>`;
  html += `<div class="stat-card accent"><div class="stat-num">${withCoords}</div><div class="stat-label">已标注坐标</div></div>`;
  if (filteredCount !== undefined) html += `<div class="stat-card"><div class="stat-num">${filteredCount}</div><div class="stat-label">搜索结果</div></div>`;
  Object.keys(byFloor).sort().forEach(f => {
    html += `<div class="stat-card clickable" onclick="filterByFloor('${f}')"><div class="stat-num">${byFloor[f]}</div><div class="stat-label">${f}</div></div>`;
  });
  document.getElementById('statsBar').innerHTML = html;
}

function filterByFloor(floor) {
  document.getElementById('searchInput').value = floor;
  doSearch();
  switchTab('search');
}

/* ====== MAP CLICK ====== */
function onMapClick(e) {
  if (!isMarkMode) return;
  const img = document.getElementById('floorImg');
  if (!img.complete || !img.naturalWidth) return;
  const rect = img.getBoundingClientRect();
  const xPct = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  const yPct = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
  const crosshair = document.getElementById('crosshair');
  crosshair.style.display = 'block';
  crosshair.style.left = xPct + '%';
  crosshair.style.top = yPct + '%';
  document.getElementById('coordDisplay').textContent = `已标记 ${xPct}%, ${yPct}%`;
  if (pendingCoordShopId) {
    const shops = getShops();
    const idx = shops.findIndex(s => s._id === pendingCoordShopId);
    if (idx >= 0) {
      shops[idx].coordX = parseFloat(xPct);
      shops[idx].coordY = parseFloat(yPct);
      shops[idx].floor = floorConfig[currentFloorIdx].id;
      saveShops(shops);
      document.getElementById('coordDisplay').textContent += `  ✓ 已更新「${shops[idx].num}」`;
    }
    pendingCoordShopId = null;
  }
  document.getElementById('editCoordX').value = xPct;
  document.getElementById('editCoordY').value = yPct;
  document.getElementById('editFloor').value = floorConfig[currentFloorIdx].id;
  exitMarkMode();
  // Auto-switch back to data tab
  setTimeout(() => switchTab('data'), 200);
}

function markMode(shopId) {
  isMarkMode = true;
  pendingCoordShopId = shopId || document.getElementById('editId').value || null;
  document.getElementById('modeIndicator').className = 'mode-badge mark';
  document.getElementById('modeIndicator').textContent = '标记中';
  document.getElementById('clickHint').textContent = '在地图上点击编号所在位置';
  document.getElementById('clickHint').style.color = 'var(--amber)';
  switchTab('map');

  // Clear any previous markers
  document.getElementById('mapOverlay').innerHTML = '';
  document.getElementById('crosshair').style.display = 'none';
  document.getElementById('coordDisplay').textContent = '';

  // Determine target floor and show old coords if exist
  let targetFloor = null;
  let label = '';
  let oldCoords = null;
  if (shopId) {
    const s = getShops().find(s => s._id === shopId);
    if (s) {
      targetFloor = s.floor;
      label = `点击「${s.num}」在地图上的新位置`;
      if (s.coordX != null && s.coordY != null) {
        oldCoords = { x: s.coordX, y: s.coordY, num: s.num };
      }
    }
  }
  if (!targetFloor) {
    targetFloor = document.getElementById('editFloor').value;
    const num = document.getElementById('editNum').value;
    const cx = document.getElementById('editCoordX').value;
    const cy = document.getElementById('editCoordY').value;
    label = targetFloor ? `点击「${num||'编号'}」在 ${targetFloor} 图上的新位置` : '在地图上点击编号所在位置';
    if (cx && cy) {
      oldCoords = { x: parseFloat(cx), y: parseFloat(cy), num: num || '' };
    }
  }
  if (targetFloor) {
    const fi = floorConfig.findIndex(f => f.id === targetFloor);
    if (fi >= 0) showFloorMap(fi);
  }

  // Show old coordinates with gray marker
  if (oldCoords) {
    const overlay = document.getElementById('mapOverlay');
    overlay.innerHTML = `
      <div class="map-marker-old" style="left:${oldCoords.x}%;top:${oldCoords.y}%;width:32px;height:32px;"></div>
      <div class="map-label-old" style="left:${oldCoords.x}%;top:${oldCoords.y}%;transform:translate(20px,-20px);">旧坐标</div>
    `;
    document.getElementById('coordDisplay').textContent = `旧坐标 ${oldCoords.x}%, ${oldCoords.y}%`;
  }

  document.getElementById('mapInfo').textContent = label;
}

function exitMarkMode() {
  isMarkMode = false;
  document.getElementById('modeIndicator').className = 'mode-badge browse';
  document.getElementById('modeIndicator').textContent = '浏览';
  document.getElementById('clickHint').textContent = '点击楼层图查看高清大图';
  document.getElementById('clickHint').style.color = 'var(--text3)';
}

/* ====== DATA CRUD ====== */
function saveShop() {
  const floor = document.getElementById('editFloor').value;
  const num = document.getElementById('editNum').value.trim();
  const elevator = document.getElementById('editElevator').value.trim();
  const direction = document.getElementById('editDirection').value.trim();
  const coordX = document.getElementById('editCoordX').value.trim();
  const coordY = document.getElementById('editCoordY').value.trim();
  const editId = document.getElementById('editId').value;
  if (!floor || !num) { alert('楼层和编号为必填项'); return; }
  const shops = getShops();
  const data = { floor, num, elevator, direction,
    coordX: coordX ? parseFloat(coordX) : null,
    coordY: coordY ? parseFloat(coordY) : null
  };
  if (editId) {
    const idx = shops.findIndex(s => s._id === editId);
    if (idx >= 0) shops[idx] = { ...shops[idx], ...data };
  } else {
    data._id = Date.now().toString(36) + Math.random().toString(36).substr(2,5);
    shops.push(data);
  }
  saveShops(shops);
  clearForm();
  renderShopTable();
  updateStats();
}

function editShop(id) {
  const s = getShops().find(s => s._id === id);
  if (!s) return;
  document.getElementById('editId').value = s._id;
  document.getElementById('editFloor').value = s.floor;
  document.getElementById('editNum').value = s.num;
  document.getElementById('editElevator').value = s.elevator||'';
  document.getElementById('editDirection').value = s.direction||'';
  document.getElementById('editCoordX').value = s.coordX!=null ? s.coordX : '';
  document.getElementById('editCoordY').value = s.coordY!=null ? s.coordY : '';
  document.getElementById('editFloor').scrollIntoView({behavior:'smooth'});
}

function deleteShop(id) {
  if (!confirm('确定删除该编号？')) return;
  saveShops(getShops().filter(s => s._id !== id));
  renderShopTable(); updateStats();
}

function clearForm() {
  ['editId','editFloor','editNum','editElevator','editDirection','editCoordX','editCoordY'].forEach(id => {
    document.getElementById(id).value = '';
  });
  exitMarkMode();
  pendingCoordShopId = null;
}

function renderShopTable() {
  const shops = getShops();
  const tbody = document.getElementById('shopTableBody');
  const empty = document.getElementById('tableEmpty');
  const table = document.getElementById('shopTable');
  if (shops.length === 0) {
    empty.style.display = 'block'; table.style.display = 'none';
  } else {
    empty.style.display = 'none'; table.style.display = 'table';
    shops.sort((a,b) => (a.floor||'').localeCompare(b.floor||'') || (a.num||'').localeCompare(b.num||''));
    tbody.innerHTML = shops.map(s => `
      <tr>
        <td><span class="result-badge badge-floor" style="min-width:36px;height:22px;font-size:11px;">${s.floor}</span></td>
        <td style="font-weight:600;">${s.num}</td>
        <td class="cell-coord${s.coordX==null?' missing':''}">${s.coordX!=null ? s.coordX+'%, '+s.coordY+'%' : '未标注'}</td>
        <td>
          <div class="row-actions">
            <button class="btn-sm btn-sm-locate" onclick="locateShop('${s._id}')" title="查看位置">📍</button>
            <button class="btn-sm btn-sm-edit" onclick="editShop('${s._id}')">编辑</button>
            <button class="btn-sm btn-sm-mark" onclick="markMode('${s._id}')" title="重新标注">🎯</button>
            <button class="btn-sm btn-sm-del" onclick="deleteShop('${s._id}')">删除</button>
          </div>
        </td>
      </tr>
    `).join('');
  }
}

function clearAllData() {
  if (!confirm('确定删除全部数据？此操作不可恢复。')) return;
  if (!confirm('再次确认：删除全部？')) return;
  localStorage.removeItem(STORAGE_KEY);
  renderShopTable(); updateStats();
}

function saveMallName() {
  const n = document.getElementById('mallNameInput').value.trim();
  localStorage.setItem(MALL_KEY, n);
  document.getElementById('mallName').textContent = n || '华林国际C馆';
  document.getElementById('mallTag').textContent = n ? '已配置' : '';
}

function migrateOldData() {
  const old = JSON.parse(localStorage.getItem(OLD_KEY));
  if (!old || old.length === 0) { alert('没有旧版数据'); return; }
  const existing = getShops();
  let added = 0;
  old.forEach(os => {
    if (!existing.find(e => e.num === os.num && e.floor === os.floor)) {
      existing.push({...os, _id: os._id||('m'+Date.now().toString(36)+Math.random().toString(36).substr(2,6))});
      added++;
    }
  });
  saveShops(existing);
  renderShopTable(); updateStats();
  alert(`已合并 ${old.length} 条旧数据，新增 ${added} 条`);
}

function loadDefaults() {
  const existing = getShops();
  if (existing.length > 0 && !confirm(`当前已有 ${existing.length} 条数据。合并去重？`)) return;
  const merged = [...existing];
  DEFAULT_SHOPS.forEach(ds => {
    if (!merged.find(e => e.num === ds.num && e.floor === ds.floor)) {
      merged.push({...ds, _id: 'd'+Date.now().toString(36)+Math.random().toString(36).substr(2,6)});
    }
  });
  saveShops(merged);
  renderShopTable(); updateStats();
  alert(`已合并，共 ${merged.length} 条`);
}

/* ====== IMPORT / EXPORT ====== */
function exportData() {
  const blob = new Blob([JSON.stringify({
    mallName: getMallName(), floorConfig, shops: getShops(), exportedAt: new Date().toISOString()
  }, null, 2)], {type:'application/json'});
  downloadBlob(blob, 'mallnav_backup.json');
}

function downloadCSV() {
  const shops = getShops();
  let csv = '﻿楼层,编号,电梯,走法,X%,Y%\n';
  shops.forEach(s => {
    csv += [s.floor, s.num, s.elevator||'', s.direction||'', s.coordX!=null?s.coordX:'', s.coordY!=null?s.coordY:'']
      .map(c => '"'+(c||'').replace(/"/g,'""')+'"').join(',') + '\n';
  });
  downloadBlob(new Blob([csv], {type:'text/csv;charset=utf-8'}), 'mallnav_shops.csv');
}

function importData() {
  const text = document.getElementById('importText').value.trim();
  if (!text) return;
  let newShops = [];
  try {
    if (text.startsWith('[') || text.startsWith('{')) {
      const p = JSON.parse(text);
      newShops = Array.isArray(p) ? p : (p.shops || []);
      if (p.mallName) { localStorage.setItem(MALL_KEY, p.mallName); document.getElementById('mallName').textContent = p.mallName; document.getElementById('mallNameInput').value = p.mallName; document.getElementById('mallTag').textContent = '已配置'; }
    } else {
      const lines = text.split('\n').filter(l=>l.trim());
      const start = lines[0].includes('楼层') ? 1 : 0;
      for (let i=start; i<lines.length; i++) {
        const p = lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
        if (p.length>=2 && p[0] && p[1]) {
          newShops.push({floor:p[0], num:p[1], elevator:p[2]||'', direction:p[3]||'',
            coordX: p[4] ? parseFloat(p[4]) : null, coordY: p[5] ? parseFloat(p[5]) : null});
        }
      }
    }
    newShops = newShops.map(s => ({...s, _id: s._id || (Date.now().toString(36)+Math.random().toString(36).substr(2,5))}));
    const existing = getShops();
    const merged = [...existing];
    newShops.forEach(ns => {
      const dup = merged.findIndex(e => e.num===ns.num && e.floor===ns.floor);
      if (dup>=0) merged[dup] = {...merged[dup], ...ns};
      else merged.push(ns);
    });
    saveShops(merged);
    document.getElementById('importText').value = '';
    document.getElementById('importArea').style.display = 'none';
    renderShopTable(); updateStats();
    alert(`导入 ${newShops.length} 条（合并后 ${merged.length} 条）`);
  } catch(e) { alert('格式错误\n'+e.message); }
}

function downloadBlob(blob, fname) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

document.addEventListener('keydown', e => { if (e.key==='Escape') { closeLightbox(); exitMarkMode(); clearForm(); } });

/* ── Lightbox ── */
function openLightbox(src) {
  document.getElementById('lightboxSpinner').style.display = 'block';
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src = '';
  document.getElementById('lightboxSpinner').style.display = 'none';
  document.body.style.overflow = '';
}

init();
</script>
